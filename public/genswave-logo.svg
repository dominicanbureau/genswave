<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo transparente -->
  <rect width="400" height="200" fill="transparent"/>
  
  <!-- Logo Genswave basado en la imagen proporcionada -->
  <g transform="translate(200,100)">
    <!-- Líneas principales del logo -->
    <path d="M-150,-30 Q-100,-70 -50,-30 Q0,10 50,-30 Q100,-70 150,-30" 
          stroke="#000000" 
          stroke-width="8" 
          fill="none" 
          stroke-linecap="round"/>
    
    <path d="M-150,-10 Q-100,-50 -50,-10 Q0,30 50,-10 Q100,-50 150,-10" 
          stroke="#000000" 
          stroke-width="6" 
          fill="none" 
          stroke-linecap="round"/>
    
    <path d="M-150,10 Q-100,-30 -50,10 Q0,50 50,10 Q100,-30 150,10" 
          stroke="#000000" 
          stroke-width="4" 
          fill="none" 
          stroke-linecap="round"/>
    
    <!-- Elementos curvos adicionales para completar el diseño -->
    <path d="M-120,-50 Q-70,-90 -20,-50 Q30,-10 80,-50" 
          stroke="#000000" 
          stroke-width="3" 
          fill="none" 
          stroke-linecap="round" 
          opacity="0.7"/>
    
    <path d="M-80,30 Q-30,-10 20,30 Q70,70 120,30" 
          stroke="#000000" 
          stroke-width="3" 
          fill="none" 
          stroke-linecap="round" 
          opacity="0.7"/>
  </g>
</svg>