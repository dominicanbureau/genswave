databases:
  - name: studio-database
    databaseName: studio_db
    user: studio_user
    plan: free

services:
  - type: web
    name: studio-app
    runtime: node
    plan: free
    buildCommand: npm install && npm run setup-production
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: studio-database
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: HTTPS
        value: true
      - key: ADMIN_EMAIL
        value: admin@studio.com
      - key: ADMIN_PASSWORD
        value: admin123
